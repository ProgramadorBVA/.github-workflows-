name: Revisar podcasts nuevos

on:
  schedule:
    - cron: "*/10 * * * *"   # cada 10 minutos
  workflow_dispatch:          # también puedes lanzarlo manualmente desde GitHub

concurrency:
  group: revisar-podcasts
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Ejecutar script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python check_podcasts.py

      - name: Guardar estado (videos ya notificados)
        run: |
          git config --global user.name "podcast-bot"
          git config --global user.email "podcast-bot@users.noreply.github.com"
          git add seen_videos.json
          git diff --staged --quiet || git commit -m "Actualizar videos vistos [skip ci]"
          git pull --rebase origin main
          git push
